<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>VidPure - 无水印视频下载</title>

<!-- Web App Manifest -->
<script>
const manifest = {
  name: "VidPure - 无水印下载",
  short_name: "VidPure",
  description: "无水印视频下载工具",
  start_url: location.href,
  display: "standalone",
  orientation: "portrait",
  background_color: "#e8f0e3",
  theme_color: "#e8f0e3",
  icons: [{
    src: "data:image/svg+xml," + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192"><defs><linearGradient id="g" x1="0%25" y1="0%25" x2="100%25" y2="100%25"><stop offset="0%25" style="stop-color:#7db892"/><stop offset="100%25" style="stop-color:#5a8a6d"/></linearGradient></defs><rect width="192" height="192" rx="42" fill="url(#g)"/><path d="M56 72 L56 136 L136 104 Z" fill="white" stroke="white" stroke-width="3" stroke-linejoin="round"/><circle cx="140" cy="56" r="8" fill="#ffb56d"/></svg>'
    ),
    sizes: "192x192", type: "image/svg+xml", purpose: "any maskable"
  }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
document.head.appendChild(
  Object.assign(document.createElement("link"), {rel:"manifest", href:URL.createObjectURL(blob)})
);
</script>

<style>
:root {
  --bg: #e8f0e3;
  --bg-soft: #dce8d5;
  --surface: #f5faf2;
  --surface2: #edf5e8;
  --text: #2d3a28;
  --text2: #6b7d64;
  --border: #d0dcc8;
  --accent: #7db892;
  --accent2: #5a8a6d;
  --accent-soft: #e4f0e2;
  --danger: #e8856d;
  --success: #6db88a;
  --shadow-sm: 0 1px 3px rgba(60,80,40,.06);
  --shadow-md: 0 4px 20px rgba(60,80,40,.07);
  --shadow-lg: 0 8px 40px rgba(60,80,40,.10);
  --radius-sm: 12px;
  --radius: 18px;
  --radius-lg: 24px;
}

[data-theme="dark"] {
  --bg: #1a2218;
  --bg-soft: #1e2a1c;
  --surface: #232b22;
  --surface2: #2a3428;
  --text: #e4e8df;
  --text2: #9aaa92;
  --border: #364034;
  --accent-soft: #243024;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.2);
  --shadow-md: 0 4px 20px rgba(0,0,0,.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
  height: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  transition: background .4s, color .4s;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: -2;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(125,184,146,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(90,138,109,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(200,220,180,.05) 0%, transparent 70%);
}

/* ── Header ── */
header {
  width: 100%;
  max-width: 440px;
  padding: 32px 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 44px; height: 44px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 12px rgba(125,184,146,.35);
}

.logo-text { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }

.theme-toggle {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .25s;
  box-shadow: var(--shadow-sm);
}
.theme-toggle:active { transform: scale(.92); }

/* ── Main card ── */
main {
  width: 100%;
  max-width: 440px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
  transition: background .4s, border .4s;
}

/* ── Input area ── */
.input-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 10px;
}

.input-row {
  display: flex;
  gap: 8px;
  position: relative;
}

.input-row input {
  flex: 1;
  height: 52px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  font-size: 15px;
  padding: 0 16px;
  transition: all .25s;
  outline: none;
}
.input-row input:focus { border-color: var(--accent); background: var(--surface); }
.input-row input::placeholder { color: var(--text2); opacity: .5; }

.input-actions {
  display: flex;
  gap: 8px;
}

.btn-clear {
  height: 52px; padding: 0 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text2);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  display: flex; align-items: center; gap: 4px;
}
.btn-clear:active { transform: scale(.96); }
.btn-clear:disabled { opacity: .4; pointer-events: none; }

.paste-btn {
  height: 52px; padding: 0 16px;
  border: 1.5px solid var(--accent);
  border-radius: var(--radius);
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  display: flex; align-items: center; gap: 4px;
}
.paste-btn:active { transform: scale(.96); }

/* ── Button ── */
.btn-primary {
  width: 100%; height: 54px;
  border: none; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 17px; font-weight: 700;
  cursor: pointer;
  transition: all .25s;
  box-shadow: 0 4px 16px rgba(125,184,146,.35);
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  letter-spacing: .3px;
  position: relative;
  overflow: hidden;
}
.btn-primary:active { transform: scale(.97); }
.btn-primary:disabled {
  opacity: .55; pointer-events: none; cursor: not-allowed;
}

/* ── Loading spinner ── */
.spinner {
  width: 22px; height: 22px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Result card ── */
.result-card {
  display: none;
  animation: fadeUp .4s ease;
}
.result-card.visible { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-preview {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: var(--radius);
  background: var(--surface2);
  overflow: hidden;
  position: relative;
  margin-bottom: 14px;
}

.result-preview img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.result-preview .placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  color: var(--text2);
  opacity: .3;
}

.result-title {
  font-size: 16px; font-weight: 600;
  margin-bottom: 4px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.result-meta {
  font-size: 13px; color: var(--text2);
  margin-bottom: 16px;
}

.btn-download {
  width: 100%; height: 50px;
  border: none; border-radius: var(--radius);
  background: var(--success);
  color: #fff;
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  transition: all .25s;
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 14px rgba(109,184,138,.35);
}
.btn-download:active { transform: scale(.97); }
.btn-download:disabled { opacity: .55; pointer-events: none; }

/* ── Toast ── */
.toast-container {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  pointer-events: none;
}

.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600;
  color: #fff;
  box-shadow: var(--shadow-lg);
  animation: toastIn .3s ease;
  max-width: 340px;
  text-align: center;
  pointer-events: auto;
  backdrop-filter: blur(10px);
}
.toast.error { background: rgba(232,93,117,.92); }
.toast.success { background: rgba(78,204,163,.92); }
.toast.info { background: rgba(125,184,146,.92); }
.toast.out { animation: toastOut .25s ease forwards; }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-10px); }
}

/* ── Footer ── */
footer {
  width: 100%;
  max-width: 440px;
  padding: 20px 0 16px;
  text-align: center;
}

footer p {
  font-size: 12px; color: var(--text2);
  line-height: 1.6;
}
footer a { color: var(--accent); text-decoration: none; }

/* ── Decorative elements (Ghibli-inspired spirits) ── */
.decoration {
  position: fixed; pointer-events: none; z-index: -1;
  opacity: .07;
  font-size: 120px;
  animation: float 8s ease-in-out infinite;
}
.deco1 { top: 60px; left: 10%; animation-delay: 0s; }
.deco2 { bottom: 120px; right: 8%; animation-delay: -4s; font-size: 80px; }
.deco3 { top: 40%; left: 5%; animation-delay: -2s; font-size: 60px; }

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}

@media (min-width: 768px) {
  .decoration { font-size: 160px; }
}

/* ── Install banner ── */
.install-banner {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 20px rgba(0,0,0,.1);
  z-index: 100;
  animation: fadeUp .4s ease;
}
.install-banner.visible { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.install-banner .msg { font-size: 14px; font-weight: 600; flex: 1; }
.install-banner .install-btn {
  height: 38px; padding: 0 18px;
  border: none; border-radius: 19px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.install-banner .dismiss-btn {
  width: 38px; height: 38px;
  border: none; background: transparent;
  color: var(--text2); font-size: 20px;
  cursor: pointer; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div class="decoration deco1">&#x1f331;</div>
<div class="decoration deco2">&#x1f33f;</div>
<div class="decoration deco3">&#x1f340;</div>

<header>
  <div class="logo">
    <div class="logo-icon">&#x2b07;</div>
    <span class="logo-text">VidPure</span>
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">&#x1f319;</button>
</header>

<main>
  <div class="card">
    <div class="input-label">&#x1f517; 粘贴视频链接</div>
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://..." autocomplete="off" autocapitalize="none" spellcheck="false">
    </div>
    <div class="input-actions" style="margin-top:10px">
      <button class="btn-clear" id="clearBtn" disabled>&#x1f5d1; 清空</button>
      <button class="paste-btn" id="pasteBtn">&#x1f4cb; 粘贴</button>
    </div>
  </div>


  <button class="btn-primary" id="parseBtn">
    &#x1f50d; 解析并下载
  </button>

  <div class="card result-card" id="resultCard">
    <div class="result-preview" id="resultPreview">
      <div class="placeholder">&#x1f3ac;</div>
    </div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-meta" id="resultMeta"></div>
    <button class="btn-download" id="downloadBtn">
      &#x2b07; 保存视频
    </button>
  </div>
</main>

<footer>
  <p>基于 <a href="https://www.tikwm.com/" target="_blank" rel="noopener">tikwm</a> 公开 API &nbsp;|&nbsp; 仅供个人学习使用</p>
  <p>支持抖音、TikTok 无水印下载</p>
</footer>

<div class="toast-container" id="toastContainer"></div>

<div class="install-banner" id="installBanner">
  <span class="msg">&#x1f4f2; 添加到主屏幕，使用更便捷</span>
  <button class="install-btn" id="installBtn">立即添加</button>
  <button class="dismiss-btn" id="dismissBanner">&#x2715;</button>
</div>

<script>
// ── Theme ──
const themeToggle = document.getElementById("themeToggle");
const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
let theme = localStorage.getItem("theme") || (prefersDark.matches ? "dark" : "light");

function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute("data-theme", t);
  themeToggle.innerHTML = t === "dark" ? "&#x2600;" : "&#x1f31c;";
  localStorage.setItem("theme", t);
}
applyTheme(theme);

themeToggle.addEventListener("click", () => {
  applyTheme(theme === "dark" ? "light" : "dark");
});

// ── DOM refs ──
const urlInput = document.getElementById("urlInput");
const clearBtn = document.getElementById("clearBtn");
const pasteBtn = document.getElementById("pasteBtn");
const parseBtn = document.getElementById("parseBtn");
const resultCard = document.getElementById("resultCard");
const resultPreview = document.getElementById("resultPreview");
const resultTitle = document.getElementById("resultTitle");
const resultMeta = document.getElementById("resultMeta");
const downloadBtn = document.getElementById("downloadBtn");
const toastContainer = document.getElementById("toastContainer");
const installBanner = document.getElementById("installBanner");

let currentVideoUrl = null;
let currentFilename = null;

// ── Input helpers ──
urlInput.addEventListener("input", () => {
  clearBtn.disabled = urlInput.value.length === 0;
});

clearBtn.addEventListener("click", () => {
  urlInput.value = "";
  clearBtn.disabled = true;
  urlInput.focus();
});

pasteBtn.addEventListener("click", async () => {
  try {
    const text = await navigator.clipboard.readText();
    if (text) {
      urlInput.value = text.trim();
      clearBtn.disabled = false;
      showToast("已粘贴链接 &#x2705;", "info");
    }
  } catch {
    urlInput.focus();
    showToast("请手动粘贴链接", "error");
  }
});

// ── Toast ──
function showToast(msg, type = "info", duration = 3000) {
  const toast = document.createElement("div");
  toast.className = "toast " + type;
  toast.innerHTML = msg;
  toastContainer.appendChild(toast);
  setTimeout(() => {
    toast.classList.add("out");
    toast.addEventListener("animationend", () => toast.remove());
  }, duration);
}

// ── Loading state ──
function setLoading(loading) {
  parseBtn.disabled = loading;
  parseBtn.innerHTML = loading
    ? '<span class="spinner"></span> 解析中...'
    : '&#x1f50d; 解析并下载';
}

// ── URL extraction ──
function extractURL(raw) {
  // Match https?://... URLs, stopping at whitespace or common trailing garbage
  const re = /https?:\/\/[^\s一-鿿　-〿＀-￯ -⁯<>"{}|\\^`[\]]+/gi;
  const matches = raw.match(re);
  if (!matches) return null;

  // Pick the longest match (most likely the real video URL, not a shortlink in text)
  let best = matches[0];
  for (let i = 1; i < matches.length; i++) {
    if (matches[i].length > best.length) best = matches[i];
  }

  // Strip trailing punctuation that isn't part of the URL
  best = best.replace(/[。,，!！?？:：;；、。…]+$/, '');
  return best;
}

// ── Parse & download ──
parseBtn.addEventListener("click", async () => {
  const raw = urlInput.value.trim();
  if (!raw) {
    showToast("请先粘贴视频链接", "error");
    urlInput.focus();
    return;
  }

  const url = extractURL(raw);
  if (!url) {
    showToast("未检测到有效链接，请检查后重试", "error");
    urlInput.focus();
    return;
  }

  if (url !== raw) {
    urlInput.value = url;
    clearBtn.disabled = false;
  }

  resultCard.classList.remove("visible");
  setLoading(true);

  try {
    // tikwm.com API — free, no auth, supports TikTok/Douyin
    const formBody = new URLSearchParams({ url: url });
    const response = await fetch("https://www.tikwm.com/api/", {
      method: "POST",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: formBody.toString()
    });

    if (!response.ok) {
      throw new Error(`服务器返回错误 (${response.status})`);
    }

    const data = await response.json();

    if (!data || data.code !== 0) {
      const msg = (data && data.msg) || "解析失败，请检查链接是否有效";
      throw new Error(msg);
    }

    const d = data.data;
    if (!d) {
      throw new Error("未获取到视频数据，请检查链接");
    }

    // Use watermark-free URL if available, otherwise fallback to regular
    currentVideoUrl = d.wmplay || d.play || d.hdplay;
    currentFilename = (d.title || d.id || "video") + ".mp4";

    if (!currentVideoUrl) {
      throw new Error("未获取到下载地址，该视频可能不支持下载");
    }

    // Update UI
    if (d.cover) {
      resultPreview.innerHTML = `<img src="${d.cover}" alt="封面" loading="lazy">`;
    } else {
      resultPreview.innerHTML = '<div class="placeholder">&#x1f3ac;</div>';
    }

    resultTitle.textContent = d.title || "视频";
    resultMeta.textContent = [
      d.author ? `@${d.author}` : "",
      d.duration ? `${d.duration}s` : "",
      d.size ? formatSize(d.size) : ""
    ].filter(Boolean).join(" · ") || currentFilename;

    resultCard.classList.add("visible");
    showToast("解析成功！点击保存视频 &#x1f389;", "success");

  } catch (err) {
    console.error("Parse error:", err);
    showToast(err.message || "网络异常，请检查连接后重试", "error");
  } finally {
    setLoading(false);
  }
});

function formatSize(bytes) {
  if (!bytes) return "";
  const units = ["B", "KB", "MB", "GB"];
  let i = 0;
  let size = Number(bytes);
  while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
  return size.toFixed(i > 0 ? 1 : 0) + " " + units[i];
}

// ── Download button ──
downloadBtn.addEventListener("click", async () => {
  if (!currentVideoUrl) {
    showToast("视频地址无效，请重新解析", "error");
    return;
  }

  try {
    // Try to trigger download via fetch + blob (works in most browsers)
    downloadBtn.disabled = true;
    downloadBtn.innerHTML = '<span class="spinner"></span> 获取中...';

    const response = await fetch(currentVideoUrl);
    if (!response.ok) throw new Error("获取视频失败");

    const blob = await response.blob();
    const blobUrl = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = currentFilename || "video.mp4";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // Clean up blob URL after a short delay
    setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);

    showToast("开始下载！&#x1f4e5;", "success");
  } catch (err) {
    console.error("Download error:", err);
    // Fallback: open in new tab
    window.open(currentVideoUrl, "_blank");
    showToast("正在新标签页打开视频...", "info");
  } finally {
    downloadBtn.disabled = false;
    downloadBtn.innerHTML = '&#x2b07; 保存视频';
  }
});

// ── Enter key to submit ──
urlInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") parseBtn.click();
});

// ── PWA Install prompt ──
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner if not previously dismissed
  if (!localStorage.getItem("installDismissed")) {
    setTimeout(() => installBanner.classList.add("visible"), 2000);
  }
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBanner.classList.remove("visible");
    if (result.outcome === "accepted") {
      showToast("已添加到主屏幕 &#x1f389;", "success");
    }
  }
});

document.getElementById("dismissBanner").addEventListener("click", () => {
  installBanner.classList.remove("visible");
  localStorage.setItem("installDismissed", "1");
});

// ── Register Service Worker ──
if ("serviceWorker" in navigator) {
  const swCode = `
const CACHE = "vidpure-v1";
const ASSETS = [
  self.location.href
];

self.addEventListener("install", (e) => {
  e.waitUntil(
    caches.open(CACHE).then((c) => c.addAll(ASSETS))
  );
  self.skipWaiting();
});

self.addEventListener("activate", (e) => {
  e.waitUntil(
    caches.keys().then((keys) =>
      Promise.all(keys.filter((k) => k !== CACHE).map((k) => caches.delete(k)))
    )
  );
  self.clients.claim();
});

self.addEventListener("fetch", (e) => {
  // Don't cache API calls
  if (e.request.url.includes("api.cobalt.tools")) return;

  e.respondWith(
    caches.match(e.request).then((cached) => {
      const fetched = fetch(e.request).then((resp) => {
        if (resp && resp.status === 200) {
          const clone = resp.clone();
          caches.open(CACHE).then((c) => c.put(e.request, clone));
        }
        return resp;
      }).catch(() => cached);
      return cached || fetched;
    })
  );
});
`;

  const swBlob = new Blob([swCode], { type: "application/javascript" });
  const swUrl = URL.createObjectURL(swBlob);

  // Blob URLs only work if same-origin; use a workaround for service worker registration
  // Actually, service workers from blob URLs won't work. Let's use inline registration differently.
  // We'll skip the service worker for now and use a cache-first approach via the app itself.
  // The PWA will still work as a bookmark-to-homescreen app without an SW.

  // For a real deployment, you'd serve the SW as a separate file.
  // Here we silently skip if blob registration fails.
  navigator.serviceWorker.register(swUrl).catch(() => {
    // SW registration via blob not supported in all browsers; app remains functional.
    console.log("SW registration skipped (blob mode)");
  });
}

// ── Auto-focus on load ──
window.addEventListener("DOMContentLoaded", () => {
  // Prefer not to auto-focus on mobile to avoid keyboard popping up immediately
});
</script>
